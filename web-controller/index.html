<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src http://127.0.0.1:7724 http://127.0.0.1:7723; style-src 'unsafe-inline' 'self';" />
    <title>WAVE for vMix</title>
    <style>
      :root { color-scheme: dark; --accent: #16d6aa; }
      html, body { margin: 0; padding: 24px; background: #0a0a0b; color: #f4f4f5; font-family: -apple-system, system-ui, sans-serif; }
      h1 { margin: 0 0 12px; font-size: 18px; }
      .row { display: flex; gap: 12px; align-items: center; margin: 16px 0; }
      button { min-height: 44px; padding: 0 18px; border: 1px solid #3f3f46; background: #18181b; color: #f4f4f5; border-radius: 6px; font-size: 14px; cursor: pointer; }
      button.primary { background: var(--accent); color: #0a0a0b; border-color: var(--accent); font-weight: 600; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #71717a; }
      .dot.live { background: var(--accent); }
      .dot.err { background: #ef4444; }
      .small { color: #a1a1aa; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>WAVE for vMix</h1>
    <div class="row">
      <span id="dot" class="dot"></span>
      <span id="status">Not connected</span>
    </div>
    <div class="row">
      <button id="start" class="primary">Send program to WAVE</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <div class="small">Requires the companion sidecar (port 7724). See README.</div>
    <script src="./wave-bridge.js"></script>
  </body>
</html>
